// FleetKanban gRPC schema (Phase A).
//
// This file is the source of truth for the Go sidecar <-> Flutter UI contract.
// Method and field shapes mirror internal/app.Service and internal/task/store
// so the Go handlers can adapt 1:1 without a second domain model.
//
// The AgentEvent kind/payload strings are NOT converted to enums. They are
// persisted verbatim in the events table and interpreted per-kind by the
// frontend; keeping them as strings preserves forward compatibility when new
// EventKind values are added without a proto bump.
syntax = "proto3";

package fleetkanban.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/haya3/fleetkanban/internal/ipc/gen/fleetkanban/v1;fleetkanbanv1";

// ---------------------------------------------------------------------------
// Services
// ---------------------------------------------------------------------------

service TaskService {
  rpc CreateTask    (CreateTaskRequest)    returns (Task);
  rpc ListTasks     (ListTasksRequest)     returns (ListTasksResponse);
  rpc GetTask       (IdRequest)            returns (Task);
  rpc GetTaskDiff   (IdRequest)            returns (DiffResponse);
  rpc RunTask       (IdRequest)            returns (google.protobuf.Empty);
  rpc CancelTask    (IdRequest)            returns (google.protobuf.Empty);
  rpc FinalizeTask  (FinalizeTaskRequest)  returns (google.protobuf.Empty);

  // DeleteTask removes a task row and its associated worktree from disk.
  // Intended for pruning terminal (done / cancelled / failed / aborted)
  // or stuck tasks that the user wants off the Kanban entirely. The
  // branch is preserved by default; pass delete_branch=true to also
  // remove the fleetkanban/<id> branch.
  //
  // Running tasks (in_progress / ai_review) must be cancelled first —
  // the sidecar rejects Delete calls for those states with
  // FailedPrecondition so the UI can prompt for cancel.
  rpc DeleteTask    (DeleteTaskRequest)    returns (google.protobuf.Empty);

  // DeleteTaskBranch force-removes the fleetkanban/<id> branch of a
  // finalized task (Done or Aborted) while leaving the task row intact.
  // Intended for the Housekeeping UI's Stale list "Discard" action; the
  // UI is responsible for confirming the user understands unmerged work
  // on the branch will be lost. Returns FailedPrecondition for tasks in
  // any other status, and NotFound when the task itself is missing.
  rpc DeleteTaskBranch (IdRequest) returns (google.protobuf.Empty);

  // SubmitReview records a reviewer decision for a task in ai_review or
  // human_review. When action == APPROVE the task transitions toward done
  // (human_review only — caller then calls FinalizeTask). When action ==
  // REWORK the feedback is persisted and the task is transitioned back to
  // queued; the orchestrator prepends feedback to the next Copilot prompt.
  // When action == REJECT the task transitions to failed(ai_review).
  rpc SubmitReview  (SubmitReviewRequest)  returns (google.protobuf.Empty);

  rpc TaskEvents    (TaskEventsRequest)    returns (TaskEventsResponse);
  rpc WatchEvents   (WatchEventsRequest)   returns (stream AgentEvent);
}

// SubtaskService manages the AI-authored subtask DAG for a parent task.
// Subtasks are produced by the planner (one role per node, dependency
// edges in depends_on) and executed one Copilot session per node.
service SubtaskService {
  rpc ListSubtasks     (ListSubtasksRequest)     returns (ListSubtasksResponse);
  rpc CreateSubtask    (CreateSubtaskRequest)    returns (Subtask);
  rpc UpdateSubtask    (UpdateSubtaskRequest)    returns (Subtask);
  rpc DeleteSubtask    (IdRequest)               returns (google.protobuf.Empty);
  rpc ReorderSubtasks  (ReorderSubtasksRequest)  returns (google.protobuf.Empty);

  // GetSubtaskContext returns the full prompt + injected context the
  // Copilot agent saw for a given subtask execution — system prompt,
  // user prompt, plan summary, prior-subtask summaries, memory block,
  // and the harness SKILL.md that was active at run time. Round 0
  // means "latest round recorded". Returns a CopilotSubtaskContext
  // with not_recorded=true when the subtask predates the v18 schema
  // or has not been executed yet — the UI shows a fallback notice.
  rpc GetSubtaskContext (GetSubtaskContextRequest) returns (CopilotSubtaskContext);
}

service RepositoryService {
  rpc RegisterRepository (RegisterRepositoryRequest)  returns (Repository);
  rpc ListRepositories   (google.protobuf.Empty)      returns (ListRepositoriesResponse);
  rpc CheckGitConfig     (google.protobuf.Empty)      returns (GitConfigStatus);

  // ScanGitRepositories walks `path` up to `max_depth` levels deep looking
  // for `.git` entries. Useful when the user picks a folder that itself
  // is not a repository but contains several (e.g. `C:\src\` with
  // `C:\src\app\.git` + `C:\src\lib\.git`). The response is filtered to
  // paths that are NOT yet registered so the UI can offer one-tap
  // multi-registration.
  rpc ScanGitRepositories (ScanGitRepositoriesRequest)  returns (ScanGitRepositoriesResponse);

  // UpdateDefaultBaseBranch pins (or unpins) a repository's default base
  // branch. Empty default_base_branch clears the pin and returns the
  // repository to auto-detection mode (origin/HEAD → main → master → HEAD).
  // Non-empty values are validated against refs/heads/ before persisting —
  // callers can rely on "success means the branch exists right now".
  rpc UpdateDefaultBaseBranch (UpdateDefaultBaseBranchRequest)
      returns (Repository);

  // ListBranches returns every refs/heads/ entry in the repository, with
  // FleetKanban's own `fleetkanban/<id>` task branches filtered out (they
  // are internal churn, not meaningful base branches). `default_branch`
  // is the result of the auto-detect resolver at call time — the UI
  // shows it as the "(auto-detect: main)" option in the new-task dialog
  // so the user sees what empty selection means.
  rpc ListBranches (ListBranchesRequest) returns (ListBranchesResponse);

  // CreateInitialCommit seeds a registered but empty repository (one that
  // was only `git init`'d and has no commits) with a single empty root
  // commit. Without this, task creation fails with "could not determine
  // a base branch" because `git worktree add` needs a committish to fork
  // from. The commit is authored as FleetKanban so it succeeds even when
  // the user has not set global user.name/user.email. Returns
  // FailedPrecondition when the repository already has commits — callers
  // should refresh their cached `has_commits` flag and hide the button.
  rpc CreateInitialCommit (IdRequest) returns (Repository);

  // StashUncommitted runs `git stash push --include-untracked` in the
  // repository's main working tree. Used by the Merge retry dialog
  // when the task's base branch is checked out with dirty changes
  // that block the merge. Returns stashed=false when the tree is
  // already clean (no error).
  rpc StashUncommitted (IdRequest) returns (StashUncommittedResponse);
}

message StashUncommittedResponse {
  // True when git actually created a stash entry; false when the
  // working tree was already clean.
  bool   stashed = 1;
  // Git's own message (e.g. "Saved working directory and index state ...").
  // Surfaced in the UI toast so the user sees the stash label and can
  // match it later via `git stash list`.
  string message = 2;
}

service ModelService {
  // ListModels returns the model IDs the embedded Copilot CLI reports as
  // available for the currently authenticated user. The UI uses this to
  // populate the Settings model pickers — hard-coded lists go stale as
  // GitHub rotates models, producing "model X is not available" errors
  // at task-run time.
  rpc ListModels (google.protobuf.Empty) returns (ListModelsResponse);
}

service AuthService {
  rpc CheckCopilotAuth       (google.protobuf.Empty)           returns (AuthStatus);

  // BeginCopilotLogin launches a headless `copilot login` subprocess on the
  // sidecar, parses the device code from its stdout, opens the GitHub
  // verification URL (with user_code pre-filled) in the default browser, and
  // returns the challenge so the UI can display it. The UI polls
  // CheckCopilotAuth to detect completion; the sidecar auto-reloads the SDK
  // client when the login subprocess exits successfully. This replaces the
  // previous StartCopilotLogin terminal-spawn flow — Device Flow is
  // inherently a browser-based step, so terminal input is never required.
  rpc BeginCopilotLogin      (google.protobuf.Empty)           returns (CopilotLoginChallenge);

  // CancelCopilotLogin terminates the login subprocess started by
  // BeginCopilotLogin, if one is running. No-op otherwise. The UI calls
  // this when the user dismisses the sign-in dialog without completing.
  rpc CancelCopilotLogin     (google.protobuf.Empty)           returns (google.protobuf.Empty);

  // GetCopilotLoginSession reports the lifecycle state of the login
  // subprocess owned by BeginCopilotLogin. The sign-in dialog polls this
  // instead of CheckCopilotAuth so that stale "already authenticated" state
  // from the previous SDK client (common on account-switch flows, where
  // ReloadAuth only runs after the new login succeeds) cannot close the
  // dialog prematurely. SUCCEEDED is set only once the subprocess exits
  // cleanly AND the SDK client has been reloaded with the fresh
  // credentials, so callers can trust it as the "login complete" signal.
  rpc GetCopilotLoginSession (google.protobuf.Empty)           returns (CopilotLoginSessionInfo);

  // StartCopilotLogout opens an interactive terminal with the embedded
  // Copilot CLI. The user is expected to type "/logout" (the CLI does not
  // expose a headless logout subcommand). Device Flow login afterwards
  // should be initiated via BeginCopilotLogin, not this terminal.
  rpc StartCopilotLogout     (google.protobuf.Empty)           returns (google.protobuf.Empty);

  // ReloadCopilotAuth forces the embedded Copilot CLI server to restart so
  // it re-reads the on-disk OAuth token store. The onboarding UI calls
  // this after the user completes /login in the spawned terminal, because
  // auth.getStatus against a long-running CLI server may otherwise keep
  // reporting the stale pre-login state. Returns the fresh AuthStatus so
  // the caller can transition off the onboarding screen in one round-trip.
  rpc ReloadCopilotAuth      (google.protobuf.Empty)           returns (AuthStatus);

  // Backward-compatible shortcuts for the "default" (active) PAT. New code
  // should prefer the label-aware APIs below.
  rpc HasGitHubToken         (google.protobuf.Empty)           returns (BoolValue);
  rpc SetGitHubToken         (SetGitHubTokenRequest)           returns (google.protobuf.Empty);

  // Label-aware PAT management. Multiple PATs can be stored, each under a
  // user-chosen label; one is marked active and fed into the Copilot SDK
  // ClientOptions.GitHubToken. Switching the active token hot-reloads the
  // SDK client so the change takes effect without a sidecar restart.
  // (Approach B)
  rpc ListGitHubTokens       (google.protobuf.Empty)           returns (ListGitHubTokensResponse);
  rpc AddGitHubToken         (AddGitHubTokenRequest)           returns (google.protobuf.Empty);
  rpc RemoveGitHubToken      (GitHubTokenLabelRequest)         returns (google.protobuf.Empty);
  rpc SetActiveGitHubToken   (GitHubTokenLabelRequest)         returns (google.protobuf.Empty);

  // GetGitHubAccountInfo fetches `/user` from the GitHub REST API with the
  // active PAT and surfaces plan + profile metadata. Returns INVALID_ARGUMENT
  // when no PAT is configured. Premium-request quotas are not exposed by the
  // GitHub public API, so the response intentionally omits them.
  rpc GetGitHubAccountInfo   (google.protobuf.Empty)           returns (GitHubAccountInfo);

  // GetCopilotQuota returns the Copilot billing quota snapshots for the
  // currently authenticated user (premium interactions / chat / completions
  // etc.), sourced from the SDK's account.getQuota RPC. Unlike
  // GetGitHubAccountInfo this works with device-flow login alone — no PAT
  // required — so the UI can surface remaining premium requests out of the
  // box. Returns UNAVAILABLE when the embedded Copilot CLI is not running,
  // or UNIMPLEMENTED if the bundled CLI predates the quota RPC.
  rpc GetCopilotQuota        (google.protobuf.Empty)           returns (CopilotQuotaInfo);
}

service SystemService {
  rpc GetConcurrency (google.protobuf.Empty) returns (IntValue);
  rpc SetConcurrency (IntValue)              returns (IntValue);
  rpc Shutdown       (google.protobuf.Empty) returns (google.protobuf.Empty);

  // GetVersion returns the sidecar's ProtocolVersion. The UI calls this
  // immediately after connecting (including when reusing a handshake from
  // a prior sidecar instance) and kills + respawns the process if the
  // version doesn't match the client's compiled-in expectation. That
  // replaces the silent "UNIMPLEMENTED: unknown service ..." failure
  // mode after a rebuild where the old sidecar is still running.
  rpc GetVersion     (google.protobuf.Empty) returns (VersionInfo);

  // GetPreconditions lists runtime dependencies the sidecar requires
  // (today: PowerShell 7+). The UI calls this on first render and shows
  // a modal if any dependency reports satisfied=false so the user can
  // resolve the setup gap without dropping to a terminal.
  rpc GetPreconditions (google.protobuf.Empty)          returns (PreconditionsResponse);

  // InstallPrecondition attempts the canonical auto-install for the
  // named dependency (e.g. winget per-user install of PowerShell 7).
  // Blocks for the duration of the install — 1–3 minutes typical — so
  // the UI should reserve headroom in any client-side gRPC timeout.
  rpc InstallPrecondition (InstallPreconditionRequest)  returns (InstallPreconditionResponse);

  // GetAgentSettings / SetAgentSettings expose the user-controlled
  // output-language preference. Per-stage prompt customisation was
  // removed in favour of the IHR Charter (harness-skill/SKILL.md) —
  // that is the sanctioned surface for editing planner / runner /
  // reviewer behaviour.
  rpc GetAgentSettings (google.protobuf.Empty) returns (AgentSettings);
  rpc SetAgentSettings (AgentSettings)         returns (AgentSettings);
}

// AgentSettings carries the free-form output-language directive
// (e.g. "Japanese", "Spanish", "casual English") the agent uses when
// choosing the language of its summaries / explanations / feedback.
// Empty means "no language hint"; the agent falls back to the
// model's default.
message AgentSettings {
  reserved 1, 2, 3;
  reserved "plan_prompt", "code_prompt", "review_prompt";
  // Free-form natural-language identifier the agent uses to choose
  // the language of its summaries / explanations / feedback. The
  // sidecar passes this verbatim — the AI is expected to recognise
  // values like "日本語", "Japanese", "Português brasileiro", etc.
  string output_language = 4;
}

// WorktreeService exposes the contents of the per-repo `git worktree list`
// output joined with the local tasks DB, so the Worktrees pane can show
// every worktree FleetKanban knows about (including orphans whose task row
// has been deleted, and worktrees whose on-disk directory was removed
// outside the app).
service WorktreeService {
  rpc ListWorktrees  (google.protobuf.Empty) returns (ListWorktreesResponse);
  rpc RemoveWorktree (RemoveWorktreeRequest) returns (google.protobuf.Empty);
}

// ---------------------------------------------------------------------------
// Common wrappers
// ---------------------------------------------------------------------------

message IdRequest   { string id = 1; }
message BoolValue   { bool  value = 1; }
message IntValue    { int32 value = 1; }

// VersionInfo is the payload of SystemService.GetVersion. protocol_version
// mirrors internal/branding.ProtocolVersion and bumps whenever the gRPC
// contract changes in a breaking way. app_version is a free-form
// human-readable build string (empty unless the binary is ldflags-tagged).
message VersionInfo {
  int32  protocol_version = 1;
  string app_version      = 2;
  // Module version of github.com/github/copilot-sdk/go linked into the
  // sidecar binary. Empty if the build info is not available (unusual —
  // only happens for stripped test builds).
  string copilot_sdk_version = 3;
  // Go runtime version (e.g. "go1.24.0") the sidecar was compiled with.
  // Useful for bug reports without asking the user to run `go version`.
  string go_version = 4;
}

// Precondition is one runtime dependency the sidecar requires. `kind`
// is a stable identifier the UI can switch on (e.g. "pwsh"); the other
// fields are human-readable text for the precondition banner.
// `auto_installable` is true when the sidecar can resolve this
// dependency via InstallPrecondition without user elevation; false
// means the manual_command must be shown instead.
message Precondition {
  string kind             = 1;
  bool   satisfied        = 2;
  string description      = 3;
  bool   auto_installable = 4;
  // Free-form detail ("found on PATH", "pwsh.exe not found ...") —
  // useful for debugging without dropping to logs.
  string detail           = 5;
  // Shell command the user can run themselves if auto-install is
  // unavailable or fails. Empty when no canonical manual path exists.
  string manual_command   = 6;
}

message PreconditionsResponse {
  repeated Precondition preconditions = 1;
}

message InstallPreconditionRequest {
  // Must match a kind returned by GetPreconditions; unknown kinds are
  // rejected with InvalidArgument.
  string kind = 1;
}

message InstallPreconditionResponse {
  // Post-install snapshot of the precondition. satisfied=true on
  // success; on failure the error field carries a short human message
  // (the full installer output is logged server-side).
  Precondition precondition = 1;
  string       error        = 2;
}

// ---------------------------------------------------------------------------
// Domain messages
// ---------------------------------------------------------------------------

// Task mirrors internal/task.Task. Status / error_code are kept as strings
// (matching the DB representation) rather than enums, so adding new states
// does not require a proto bump.
message Task {
  string id              = 1;
  string repository_id   = 2;
  string goal            = 3;
  string base_branch     = 4;
  string branch          = 5;
  string worktree_path   = 6;
  string model           = 7;
  string status          = 8;   // pending|running|awaiting_review|completed|merged|cancelled|aborted|failed
  string error_code      = 9;   // empty unless status == failed
  string error_message   = 10;
  string session_id      = 11;
  bool   branch_exists   = 12;
  google.protobuf.Timestamp created_at   = 13;
  google.protobuf.Timestamp updated_at   = 14;
  google.protobuf.Timestamp started_at   = 15;  // nil when never started
  google.protobuf.Timestamp finished_at  = 16;  // nil when still running/pending
  // Most recent reviewer feedback. Populated whenever SubmitReview records
  // a REWORK decision; shown in the Human Review UI so the user can see
  // what the previous reviewer asked for.
  string review_feedback = 17;
  // Number of AI Review → queued rework cycles this task has been through
  // since its last fresh run. Capped by orchestrator.MaxReworkCount; on
  // overflow the task is escalated to human_review instead of re-queued.
  int32 rework_count = 18;
  // Models actually used by the Plan and Review stages (Code stage uses
  // `model` above). Empty when the stage has not run yet. Surfaced in the
  // UI as per-stage badges so the user can tell which model produced each
  // artifact without inspecting the event stream.
  string plan_model   = 19;
  string review_model = 20;
  // harness_version is the HarnessSkill version active when this task was
  // last run. 0 means the task predates NLAH Phase A or no harness was
  // loaded. Populated by the orchestrator at run-time; read-only from the UI.
  int32 harness_version = 21;
}

// Subtask mirrors internal/task.Subtask. Status is a 4-value string
// (pending / doing / done / failed) rather than an enum so it can evolve
// independently. agent_role is a planner-invented role name injected into
// the subtask executor's system prompt; depends_on lists sibling subtask
// IDs that must reach `done` before this subtask may start.
message Subtask {
  string id         = 1;
  string task_id    = 2;
  string title      = 3;
  string status     = 4;   // pending|doing|done|failed
  int32  order_idx  = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  string agent_role = 8;
  repeated string depends_on = 9;
  // Model used to execute this subtask (Code stage). Empty until the
  // executor actually runs the subtask.
  string code_model = 10;
  // Round is the 1-based iteration counter within the parent task.
  // Round 1 is the planner's first decomposition; AI / Human REWORK and
  // User Re-run each create a fresh round at max+1, with the previous
  // round's subtasks left in place as history. The orchestrator only
  // executes the latest round; the UI stacks earlier rounds above as
  // visual context for the rework loop.
  int32 round = 11;
  // Prompt is the concrete instruction the planner wrote for this
  // subtask — multi-sentence, naming specific files/behaviour/verification
  // steps. BuildSubtaskPrompt folds it into the Coder's session prompt so
  // the executor has precise intent instead of guessing from the Title.
  // Empty for legacy / manual subtasks; BuildSubtaskPrompt falls back to
  // a title-only template.
  string prompt = 12;
}

message Repository {
  string id                  = 1;
  string path                = 2;  // lowercase (NTFS case-fold)
  string display_name        = 3;
  // Empty = auto-detect mode (sidecar resolves origin/HEAD → main → master
  // → current HEAD at CreateTask time). Non-empty = user-pinned; the
  // sidecar uses it as-is and fails CreateTask loudly if the branch is
  // missing (the user made an explicit choice).
  string default_base_branch = 4;
  google.protobuf.Timestamp created_at   = 5;
  google.protobuf.Timestamp last_used_at = 6;  // nil if never used
}

// AgentEvent mirrors internal/task.AgentEvent verbatim. Kind and Payload are
// string-typed on purpose; see file header for rationale.
message AgentEvent {
  string id          = 1;
  string task_id     = 2;
  int64  seq         = 3;
  string kind        = 4;
  string payload     = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message AuthStatus {
  bool   authenticated = 1;
  string user          = 2;
  string message       = 3;
  google.protobuf.Timestamp checked_at = 4;
}

message GitConfigStatus {
  bool   long_paths_ok  = 1;
  string long_paths_val = 2;
  bool   autocrlf_ok    = 3;
  string autocrlf_val   = 4;
}

// ---------------------------------------------------------------------------
// TaskService request/response
// ---------------------------------------------------------------------------

message CreateTaskRequest {
  string repository_id = 1;
  string goal          = 2;
  string base_branch   = 3;  // optional; server falls back to repo default
  string model         = 4;  // optional; Code stage — server falls back to runner default
  string plan_model    = 5;  // optional; Plan stage — server falls back to planner default
  string review_model  = 6;  // optional; Review stage — server falls back to reviewer default
}

message ListTasksRequest {
  string repo_id   = 1;  // empty = all repos
  repeated string statuses = 2;  // empty = all statuses
  int32  limit     = 3;  // 0 = no limit
  bool   ascending = 4;  // false = most-recently-updated first
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message DiffResponse {
  string unified_diff = 1;
}

// FinalizeAction is the user's post-run choice for a finalized task.
//
// KEEP removes the worktree directory but preserves `fleetkanban/<id>` so
// the user can still inspect or manually merge the commits later.
//
// MERGE attempts a fast-forward (or --no-ff merge commit when the base
// branch has diverged) of `fleetkanban/<id>` into the task's recorded
// `base_branch`, then removes both the worktree and the task branch.
// Conflicts or a dirty base-branch working tree abort the operation
// before any ref is touched.
//
// DISCARD removes both the worktree and the task branch without merging.
enum FinalizeAction {
  FINALIZE_ACTION_UNSPECIFIED = 0;
  FINALIZE_ACTION_KEEP        = 1;
  FINALIZE_ACTION_MERGE       = 2;
  FINALIZE_ACTION_DISCARD     = 3;
}

message FinalizeTaskRequest {
  string         id     = 1;
  FinalizeAction action = 2;
}

message DeleteTaskRequest {
  string id            = 1;
  // When true, delete the fleetkanban/<id> branch alongside the worktree.
  // Default is false (branch preserved, worktree removed) so reviewers can
  // still inspect the commits post-delete if needed.
  bool   delete_branch = 2;
}

// ReviewAction is the reviewer's verdict on an ai_review or human_review task.
enum ReviewAction {
  REVIEW_ACTION_UNSPECIFIED = 0;
  // APPROVE moves ai_review → human_review (AI approved) or is a no-op on
  // human_review (the UI then calls FinalizeTask with KEEP/MERGE to finalize).
  // Kept separate so future phases can gate FinalizeTask on AI approval.
  REVIEW_ACTION_APPROVE    = 1;
  // REWORK saves feedback, transitions the task back to queued, and tells
  // the orchestrator to prepend feedback to the next Copilot prompt.
  REVIEW_ACTION_REWORK     = 2;
  // REJECT terminates the task as failed(ai_review). Only valid from
  // ai_review; human reviewers should prefer Discard from human_review.
  REVIEW_ACTION_REJECT     = 3;
}

message SubmitReviewRequest {
  string       id       = 1;
  ReviewAction action   = 2;
  // Free-form text — required for REWORK, optional for APPROVE/REJECT.
  // Persisted on the task and added as a review.submitted event.
  string       feedback = 3;
}

message TaskEventsRequest {
  string task_id   = 1;
  int64  since_seq = 2;  // load events with seq > since_seq
  int32  limit     = 3;  // 0 = no limit
}

message TaskEventsResponse {
  repeated AgentEvent events = 1;
}

// WatchEvents is a server-stream subscription that fires every persisted
// AgentEvent across all tasks. Clients can optionally pass since_seq_by_task
// to resume after reconnecting; events whose seq <= the mapped value are
// suppressed by the server. A task id absent from the map means "send every
// future event for this task" (no backfill — use TaskEvents for backfill).
message WatchEventsRequest {
  map<string, int64> since_seq_by_task = 1;
}

// ---------------------------------------------------------------------------
// SubtaskService request/response
// ---------------------------------------------------------------------------

message ListSubtasksRequest {
  string task_id = 1;
}

message ListSubtasksResponse {
  repeated Subtask subtasks = 1;
}

// GetSubtaskContextRequest identifies one (subtask_id, round) row in
// subtask_context.
//
// Semantics of the round field:
//   * round >  0 — exact lookup, equivalent to
//                  `SELECT * FROM subtask_context WHERE subtask_id=? AND round=?`.
//                  Missing rows return not_recorded=true, not an error.
//   * round <= 0 — "latest": resolves to MAX(round) for this subtask via
//                  `ORDER BY round DESC LIMIT 1`. Zero and negative values
//                  behave identically; the UI passes 0 on the first open
//                  and the specific round when the user steps back through
//                  rework history.
//
// Rounds are monotonic per subtask (see v11 migration); a new round is
// created each time the orchestrator re-executes after an AI Review
// rework. There is no "round=0" row on disk — 0 is purely a wire shorthand.
message GetSubtaskContextRequest {
  string subtask_id = 1;
  int32  round      = 2;
}

// CopilotSubtaskContext mirrors store.SubtaskContext plus the harness
// SKILL.md content resolved via harness_skill_version_id so the UI
// only needs one RPC round-trip to render every tab of the Subtask
// Summary dialog.
message CopilotSubtaskContext {
  string subtask_id              = 1;
  int32  round                   = 2;
  // Full SDK SystemMessage content (DefaultCodePrompt + output-language
  // addendum).
  string system_prompt           = 3;
  // Full SDK user MessageOptions.Prompt (memory block + BuildSubtask
  // PromptWithContext composition).
  string user_prompt             = 4;
  // Raw stage template (DefaultCodePrompt) before language addendum.
  string stage_prompt_template   = 5;
  string plan_summary            = 6;
  // Already formatted display lines, one per prior subtask, in DAG order.
  repeated string prior_summaries = 7;
  string memory_block            = 8;
  string output_language         = 9;
  // Active harness version at run time. id is empty when the embedded
  // fallback was used (no user-authored SKILL.md yet).
  string harness_skill_version_id = 10;
  // SKILL.md content as of run time. Empty when harness_skill_version_id
  // is empty or the row has since been purged.
  string harness_skill_md         = 11;
  // True when no subtask_context row exists (legacy subtasks executed
  // before the v18 schema, or not yet executed). All other fields are
  // zero values in that case.
  bool   not_recorded             = 12;
}

message CreateSubtaskRequest {
  string task_id   = 1;
  string title     = 2;
  // Optional initial status (pending|doing|done|failed). Empty → "pending".
  string status    = 3;
  // Optional explicit order index. When 0/negative the server appends.
  int32  order_idx = 4;
  // Planner-invented agent role for execution; empty for legacy manual rows.
  string agent_role = 5;
  // Sibling subtask IDs that must reach `done` before this one may start.
  repeated string depends_on = 6;
}

message UpdateSubtaskRequest {
  string id        = 1;
  // Only non-empty fields are applied — title/status may be set
  // independently so the UI can toggle a checkbox without re-sending
  // the title.
  string title     = 2;
  string status    = 3;
}

message ReorderSubtasksRequest {
  string task_id = 1;
  // Ordered list of subtask IDs belonging to task_id. The server persists
  // order_idx as the position in this slice. IDs not present in the DB for
  // the given task are rejected with InvalidArgument.
  repeated string ids = 2;
}

// ---------------------------------------------------------------------------
// RepositoryService request/response
// ---------------------------------------------------------------------------

message RegisterRepositoryRequest {
  string path                 = 1;
  string display_name         = 2;
  // When true, the sidecar runs `git init --initial-branch=main` on the
  // target directory before registering it. The UI sets this after the
  // user confirms "Initialize this folder as a git repository?" — without
  // it the call returns FAILED_PRECONDITION ("not a git repository").
  bool   initialize_if_empty  = 3;
}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message ScanGitRepositoriesRequest {
  string path      = 1;
  // Maximum recursion depth from `path`. 0 → server default (3). Keep
  // this small; NTFS traversals over thousands of node_modules children
  // get expensive quickly.
  int32  max_depth = 2;
}

// FoundRepository is one candidate from ScanGitRepositories. `already_registered`
// is true when the path is case-insensitively equal to a path already in
// the repositories table, so the UI can grey those out.
message FoundRepository {
  string path               = 1;
  string default_branch     = 2;
  bool   already_registered = 3;
}

message ScanGitRepositoriesResponse {
  repeated FoundRepository repositories = 1;
  // True when the root path itself is already a git repo — UI should treat
  // the scan as a single-repo registration path instead of a multi-select.
  bool   root_is_repo                  = 2;
}

message UpdateDefaultBaseBranchRequest {
  string repository_id       = 1;
  // Empty clears the pin (returns the repo to auto-detection). Non-empty
  // is the short branch name to pin (e.g. "main", "develop") — must exist
  // in the repository's refs/heads/ namespace.
  string default_base_branch = 2;
}

message ListBranchesRequest {
  string repository_id = 1;
}

message ListBranchesResponse {
  // Short branch names (no refs/heads/ prefix). fleetkanban/* branches are
  // filtered out. Ordered with the auto-detected default first, the pinned
  // default (if any, and distinct) second, then the remainder in the order
  // git for-each-ref returned them (sorted by committerdate descending).
  repeated string branches = 1;
  // Branch that ResolveDefaultBranch would return right now. Empty when
  // the repo has no resolvable default (unborn HEAD / detached on a repo
  // with no refs).
  string default_branch = 2;
  // False when HEAD is unborn — i.e. the repo was only `git init`'d and
  // has no commits yet. The UI surfaces this as a warning with a one-tap
  // "Create initial commit" action that calls CreateInitialCommit.
  bool   has_commits   = 3;
}

// ---------------------------------------------------------------------------
// AuthService request/response
// ---------------------------------------------------------------------------

message SetGitHubTokenRequest {
  // Empty string clears the stored PAT.
  string token = 1;
}

// CopilotLoginChallenge is returned by BeginCopilotLogin. The UI displays
// user_code in a dialog and typically offers a button that opens
// verification_uri in the default browser (the sidecar has already opened
// it once; the button is a convenience for retry / manual control).
message CopilotLoginChallenge {
  // 8-character device code (formatted as "XXXX-XXXX") that the user types
  // into the GitHub verification page. The sidecar also appends it to
  // verification_uri as a query parameter so the user never has to copy it.
  string user_code        = 1;
  // Full URL the user should open — already includes ?user_code=...
  // and any other query params GitHub accepts for this flow.
  string verification_uri = 2;
  // How long the device code is valid. Informational; the sidecar owns
  // the actual subprocess lifetime.
  int32  expires_in_seconds = 3;
}

// CopilotLoginSessionState is the lifecycle of a `copilot login` subprocess
// owned by the sidecar's LoginCoordinator. Returned by GetCopilotLoginSession
// so the UI can drive the sign-in dialog off the subprocess itself rather
// than off CheckCopilotAuth (which reflects the SDK client's possibly-stale
// view of auth and can report authenticated=true before the new login
// completes).
enum CopilotLoginSessionState {
  // Default / pre-enum-migration fallback. Callers should treat as IDLE.
  COPILOT_LOGIN_SESSION_STATE_UNSPECIFIED = 0;
  // No login is in progress. Either BeginCopilotLogin was never called, or
  // the UI called CancelCopilotLogin to tear the session down.
  COPILOT_LOGIN_SESSION_STATE_IDLE        = 1;
  // Subprocess is alive and waiting for the user to complete the device
  // flow in the browser. The UI should keep the dialog open.
  COPILOT_LOGIN_SESSION_STATE_RUNNING     = 2;
  // Subprocess exited with status 0 AND the SDK client has been reloaded
  // against the new credentials. Safe to close the dialog.
  COPILOT_LOGIN_SESSION_STATE_SUCCEEDED   = 3;
  // Subprocess exited with a non-zero status, or ReloadAuth after a
  // successful exit failed. error_message carries the formatted reason.
  COPILOT_LOGIN_SESSION_STATE_FAILED      = 4;
}

message CopilotLoginSessionInfo {
  CopilotLoginSessionState state         = 1;
  // Populated when state == FAILED; empty otherwise.
  string                   error_message = 2;
}

// Entry in ListGitHubTokensResponse. Tokens themselves are never surfaced to
// the frontend; only label + metadata.
message GitHubTokenEntry {
  string label  = 1;  // user-chosen identifier (e.g. "work", "personal")
  bool   active = 2;  // whether this label is the one fed into the SDK
}

message ListGitHubTokensResponse {
  repeated GitHubTokenEntry tokens       = 1;
  // Empty when no tokens exist. Matches the `active` flag on one of the
  // entries when present.
  string                    active_label = 2;
}

message AddGitHubTokenRequest {
  string label      = 1;  // non-empty, unique per user
  string token      = 2;  // non-empty PAT
  bool   set_active = 3;  // if true, make this label the active one
}

message GitHubTokenLabelRequest {
  string label = 1;
}

// CopilotQuotaInfo carries every quota snapshot the SDK's account.getQuota
// RPC returns, keyed by quota type ("premium_interactions", "chat",
// "completions", …). The UI surfaces whichever key it finds interesting —
// "premium_interactions" is the headline number for the account-card panel.
message CopilotQuotaInfo {
  map<string, CopilotQuotaSnapshot> snapshots = 1;
}

// CopilotQuotaSnapshot mirrors SDK rpc.QuotaSnapshot. All counts are
// "number of requests" (not tokens); billing multiplier is applied upstream
// in the Copilot CLI before snapshots are exposed, so one used_requests
// unit equals one premium-request charge on the user's plan.
message CopilotQuotaSnapshot {
  // Number of premium requests included in the user's plan for the current
  // billing period.
  double entitlement_requests = 1;
  // Number of premium requests already consumed this billing period.
  double used_requests = 2;
  // Percentage of entitlement remaining, on a 0-100 scale. The SDK
  // supplies this directly; clients should prefer it over dividing
  // used/entitlement to match the server's rounding rules. Note: the
  // upstream SDK doc comment claims "0.0 to 1.0" but empirically the
  // Copilot CLI returns 0-100 (verified against CLI 1.0.21 / SDK v0.2.2).
  double remaining_percentage = 3;
  // Requests charged against pay-per-request overage after the entitlement
  // was exhausted. Zero for users who haven't exceeded their plan.
  double overage = 4;
  // When true, the account is configured to keep serving requests beyond
  // the entitlement (billing the user for each) instead of hard-stopping.
  bool overage_allowed_with_exhausted_quota = 5;
  // ISO-8601 timestamp of the next quota reset, or empty when the SDK did
  // not provide one (e.g. unmetered plans).
  string reset_date = 6;
}

// GitHubAccountInfo mirrors a subset of the `/user` response. Copilot-plan
// specific fields (premium_requests_remaining etc.) are not filled because
// GitHub does not expose them on the public REST API; the UI surfaces a
// static hint instead.
message GitHubAccountInfo {
  string login              = 1;
  string name               = 2;
  string avatar_url         = 3;
  // `plan.name` from the REST response: "free" / "pro" / "team" / "enterprise".
  // This reflects the GitHub account plan, which correlates with (but is not
  // identical to) the Copilot tier.
  string plan_name          = 4;
  int32  plan_private_repos = 5;
  int32  plan_collaborators = 6;
  int64  plan_space         = 7;
  // Whether this account has Copilot enabled. Derived from the SDK auth
  // state; false for users who authenticated without Copilot entitlement.
  bool   copilot_enabled    = 8;
  // Free-form summary string for the UI to fall back on when parsing fails.
  string raw_message        = 9;
}

// ---------------------------------------------------------------------------
// ModelService request/response
// ---------------------------------------------------------------------------

// ModelInfo carries the per-model metadata the Settings picker needs to
// surface billing impact (Free vs Premium request, multiplier ×N) so the
// user can pick a model with full awareness of how many premium requests
// each task will consume on their plan.
message ModelInfo {
  // Stable model identifier, e.g. "claude-sonnet-4-5". Sent verbatim to
  // SDK CreateSession and stored on Task.{plan,code,review}_model.
  string id         = 1;
  // Human-friendly display name from the Copilot CLI catalog,
  // e.g. "Claude Sonnet 4.5". Falls back to id when empty server-side.
  string name       = 2;
  // Premium-request multiplier the Copilot billing plan applies to each
  // request against this model. 0 means "no premium request charged"
  // (i.e. Free / unmetered for the user's plan); >=1 means each call
  // counts as multiplier×1 premium request. Surfaced in the picker as a
  // "Free" / "Premium ×N" badge.
  double multiplier = 3;
}

message ListModelsResponse {
  // Model catalog as advertised by the Copilot CLI server, ordered as
  // returned. Order is treated as authoritative for "first match" picks
  // (see copilot/runner.resolveModel).
  repeated ModelInfo models = 1;
}

// ---------------------------------------------------------------------------
// WorktreeService request/response
// ---------------------------------------------------------------------------

// WorktreeEntry is one row in the Worktrees pane. `task_id` is empty for
// worktrees that are not under the fleetkanban/ branch namespace (primary
// worktrees of registered repos are included so the pane can show them as
// the "(main)" row). `path_exists` reflects whether the worktree directory
// still exists on disk — false means the directory was deleted externally
// and a `git worktree prune` is needed to clean the repo metadata.
message WorktreeEntry {
  string repository_id   = 1;
  string repository_path = 2;
  string path            = 3;   // absolute worktree directory
  string branch          = 4;   // full refname, e.g. refs/heads/fleetkanban/01J...
  bool   path_exists     = 5;
  bool   is_primary      = 6;   // true for the repo's main working tree
  string task_id         = 7;   // empty unless branch is under fleetkanban/
  string task_status     = 8;   // empty unless the task row exists in DB
  string head            = 9;   // HEAD sha from `git worktree list --porcelain`
}

message ListWorktreesResponse {
  repeated WorktreeEntry worktrees = 1;
}

message RemoveWorktreeRequest {
  string repository_id = 1;
  string worktree_path = 2;
  // When true, the fleetkanban/<task-id> branch is also deleted. Only honored
  // for worktrees that live under the fleetkanban/ namespace.
  bool   delete_branch = 3;
}

// ---------------------------------------------------------------------------
// ContextService — repository-bound graph memory
// ---------------------------------------------------------------------------
//
// The Context feature stores structured knowledge about a registered
// repository as a property graph (ctx_node + ctx_edge + ctx_closure),
// vector embeddings (ctx_node_vec), and temporal facts (ctx_fact).
// Entries arrive through three channels: static analysis, the observer
// tapping session events, and manual user edits. Search is hybrid
// (BM25 + vector cosine + graph-neighborhood boost, fused via RRF) and
// feeds the three-tier injection pipeline (Passive / Reactive / Active)
// that prepends memory to Copilot prompts.
//
// Kind / rel / source_kind strings are intentionally NOT proto enums,
// matching AgentEvent.kind's convention: values are persisted verbatim
// and interpreted per-kind by the UI, so adding new kinds does not
// require a proto bump.
service ContextService {
  rpc GetOverview          (RepoIdRequest)              returns (ContextOverview);
  rpc SearchContext        (SearchContextRequest)       returns (SearchContextResponse);
  rpc ListNodes            (ListNodesRequest)           returns (ListNodesResponse);
  rpc GetNode              (NodeIdRequest)              returns (ContextNodeDetail);
  rpc CreateNode           (CreateNodeRequest)          returns (ContextNode);
  rpc UpdateNode           (UpdateNodeRequest)          returns (ContextNode);
  rpc DeleteNode           (NodeIdRequest)              returns (google.protobuf.Empty);
  rpc PinNode              (PinNodeRequest)             returns (google.protobuf.Empty);

  rpc ListEdges            (ListEdgesRequest)           returns (ListEdgesResponse);
  rpc CreateEdge           (CreateEdgeRequest)          returns (ContextEdge);
  rpc DeleteEdge           (EdgeIdRequest)              returns (google.protobuf.Empty);

  rpc ListFacts            (ListFactsRequest)           returns (ListFactsResponse);

  // PreviewInjection assembles the Passive-tier injection that WOULD be
  // prepended to a Copilot session for the given task right now, so the
  // user can audit what memory the agent will see. Does not side-effect.
  rpc PreviewInjection     (PreviewInjectionRequest)    returns (InjectionPreview);

  // AnalyzeRepository spawns a Copilot session that reads the repo and
  // emits CLAUDE.md-style architectural summary entries into the
  // scratchpad with source_kind="analyzer". The RPC returns immediately
  // and progress is observed via the WatchContextChanges stream. User
  // must promote individual entries from the Scratchpad tab to persist.
  rpc AnalyzeRepository    (AnalyzeRepoRequest)         returns (google.protobuf.Empty);

  // RebuildEmbeddings recomputes ctx_node_vec for every enabled node
  // in the repo using the current embedding provider. Safe to call
  // after enabling Memory or switching provider. Returns the count of
  // rebuilt and skipped nodes so the UI can surface a toast.
  rpc RebuildEmbeddings    (RepoIdRequest)              returns (RebuildEmbeddingsResponse);

  // RebuildClosure recomputes the closure table — the redundant
  // projection used by graph-neighborhood boost. Exposed for the
  // "Rebuild closure" admin button on the Overview tab.
  rpc RebuildClosure       (RepoIdRequest)              returns (google.protobuf.Empty);

  // RebuildCodeGraph walks the repository filesystem and upserts
  // File nodes + imports edges directly from source. Cheap — no LLM
  // calls — so the UI typically runs it after Analyze or when the
  // user notices new files are missing from Browse. Returns a
  // summary so the UI can render a toast.
  rpc RebuildCodeGraph     (RepoIdRequest)              returns (RebuildCodeGraphResponse);

  rpc GetMemorySettings    (RepoIdRequest)              returns (MemorySettings);
  rpc UpdateMemorySettings (UpdateMemorySettingsRequest) returns (MemorySettings);

  // GetMemoryHealth is a fast status probe separate from GetOverview —
  // cheap enough to poll every few seconds so the Settings panel and
  // Kanban badge can show whether Memory is actually working (provider
  // reachable, vectors present) without blocking on node/edge counts.
  rpc GetMemoryHealth      (RepoIdRequest)              returns (MemoryHealth);

  // SuggestForNewTask runs hybrid retrieval against finalized Task +
  // promoted Decision + Constraint nodes using the user's draft goal
  // as query text. The New Task dialog calls this on a 400ms debounce
  // so the user sees past similar tasks and applicable decisions
  // before they spend tokens running the plan again. Returns an empty
  // bundle (no error) when Memory is disabled — the UI renders
  // nothing in that case.
  rpc SuggestForNewTask    (SuggestForNewTaskRequest)   returns (SuggestForNewTaskResponse);

  // WatchContextChanges streams node / edge / fact / scratchpad updates
  // scoped to a repository so the Context UI can refresh incrementally
  // without polling. Analogous to TaskService.WatchEvents.
  rpc WatchContextChanges  (WatchContextRequest)        returns (stream ContextChangeEvent);
}

// ScratchpadService manages pending memory entries waiting for a trust
// gate decision. The observer and analyzer push candidates here; the
// user promotes, rejects, edits, or snoozes them from the Context
// scratchpad tab. Auto-promotion can be enabled per-repo for
// high-confidence entries via MemorySettings.
service ScratchpadService {
  rpc ListPending    (ListPendingRequest)    returns (ListPendingResponse);
  rpc GetEntry       (EntryIdRequest)        returns (ScratchpadEntry);
  rpc PromoteEntry   (EntryIdRequest)        returns (ContextNode);
  rpc RejectEntry    (RejectEntryRequest)    returns (google.protobuf.Empty);
  rpc EditAndPromote (EditAndPromoteRequest) returns (ContextNode);
  rpc SnoozeEntry    (SnoozeRequest)         returns (google.protobuf.Empty);
  rpc WatchPending   (RepoIdRequest)         returns (stream ScratchpadChangeEvent);
}

// OllamaService wraps the local Ollama HTTP API (default
// http://localhost:11434) so the UI can detect installation, list and
// pull embedding / LLM models, and stream pull progress. Used by the
// Settings onboarding flow when the user selects Ollama as the
// embedding or LLM provider.
service OllamaService {
  rpc GetOllamaStatus          (google.protobuf.Empty)  returns (OllamaStatus);
  // ListInstalledModels rather than ListModels — ModelService.ListModels
  // already claims the Go method name ListModels on the sidecar Server
  // struct, so the names must be unique for method resolution.
  rpc ListInstalledModels      (google.protobuf.Empty)  returns (OllamaListModelsResponse);
  rpc GetRecommendedModels     (google.protobuf.Empty)  returns (OllamaListRecommendedResponse);
  rpc PullOllamaModel          (PullModelRequest)       returns (stream OllamaPullProgressEvent);
}

// ---------------------------------------------------------------------------
// ContextService domain messages
// ---------------------------------------------------------------------------

// ContextNode is one entity in the property graph. kind / source_kind
// are strings; see service-level comment. content_md is Markdown that
// is rendered directly in the Browse tab and serialized into injected
// prompts. attrs is a free-form map for kind-specific metadata (e.g.
// File nodes may carry "path" and "language"; Decision nodes may carry
// "decision_id" and "rationale_url").
message ContextNode {
  string id           = 1;
  string repo_id      = 2;
  // File | Module | Function | Class | Concept | Decision | Constraint | Tag
  string kind         = 3;
  string label        = 4;
  string content_md   = 5;
  map<string, string> attrs = 6;
  // manual | observer | analyzer | static-analysis | session-summary
  string source_kind  = 7;
  float  confidence   = 8;
  bool   enabled      = 9;
  bool   pinned       = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// ContextEdge is one directed relationship between two nodes. `rel`
// values the sidecar recognises today:
//   imports | calls | contains | dependsOn | relatedTo
//   conflictsWith | coAccessedWith | supersedes | tagged
// Additional rels can be added without a proto bump — the UI renders
// unknown rels as a plain chip labelled with the string.
message ContextEdge {
  string id          = 1;
  string repo_id     = 2;
  string src_node_id = 3;
  string dst_node_id = 4;
  string rel         = 5;
  map<string, string> attrs = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ContextFact is a bi-temporal predicate anchored on a subject node.
// valid_from / valid_to bracket the wall-clock interval during which
// the fact is considered true; valid_to nil means "still active".
// `supersedes` links to the id of the fact this one replaces so the
// Facts Timeline can render succession chains (e.g. "SendGrid → Resend").
message ContextFact {
  string id              = 1;
  string repo_id         = 2;
  string subject_node_id = 3;
  string predicate       = 4;
  string object_text     = 5;
  google.protobuf.Timestamp valid_from = 6;
  google.protobuf.Timestamp valid_to   = 7;   // nil = still active
  string supersedes      = 8;
  google.protobuf.Timestamp created_at = 9;
}

// ContextNodeDetail is the full-fidelity payload returned by GetNode.
// Neighbors is the 1-hop closure of the node (both in- and out-edges
// resolved to ContextNode summaries) so the detail pane does not need
// a second round-trip to render "related items".
message ContextNodeDetail {
  ContextNode         node         = 1;
  repeated ContextEdge out_edges   = 2;  // where node is src
  repeated ContextEdge in_edges    = 3;  // where node is dst
  repeated ContextNode neighbors   = 4;  // resolved counterparts of edges
  repeated ContextFact facts       = 5;  // facts anchored on this node
  // Provenance — which session / task introduced this node. Empty when
  // source_kind == manual.
  string source_task_id = 6;
  string source_session_id = 7;
}

// ContextOverview is the Overview tab's aggregate view. Counts are
// filtered by repo_id. byte_size fields approximate on-disk storage
// for the Overview storage card (vectors dominate).
message ContextOverview {
  string repo_id = 1;
  // Per-kind node counts, keyed by kind string (e.g. "File", "Concept").
  map<string, int32> node_counts_by_kind = 2;
  // Per-rel edge counts, keyed by rel string (e.g. "imports", "calls").
  map<string, int32> edge_counts_by_rel  = 3;
  int32 active_fact_count   = 4;
  int32 expired_fact_count  = 5;
  int32 pending_scratchpad_count  = 6;
  int32 promoted_scratchpad_count = 7;
  int32 rejected_scratchpad_count = 8;
  int32 vector_count     = 9;
  int32 vector_dim       = 10;
  int64 vector_bytes     = 11;
  // Number of tasks / sessions the observer has processed for this
  // repo. Surfaced in the Overview as "28 sessions of learning".
  int32 observed_session_count = 12;
  // Whether memory is currently enabled for this repo — mirrors
  // MemorySettings.enabled so the Overview card does not need a
  // second call.
  bool enabled = 13;
}

message RepoIdRequest { string repo_id = 1; }
message NodeIdRequest { string node_id = 1; }
message EdgeIdRequest { string edge_id = 1; }
message EntryIdRequest { string entry_id = 1; }

message SearchContextRequest {
  string repo_id = 1;
  string query   = 2;
  // Which retrieval channel(s) to return. Fused is the default and
  // represents the production hybrid pipeline; the other three are
  // exposed so the Search tab can show why results differ (debug
  // view). Empty → all four populated.
  //   "semantic" | "keyword" | "fused" | "all"
  string mode    = 3;
  // Limit per channel. 0 → server default (20).
  int32  limit   = 4;
  // Optional filter on node kind (AND across entries).
  repeated string kinds = 5;
  // Optional filter on enabled flag. Unset → include both.
  bool only_enabled = 6;
}

// SearchHit is one result with its channel-specific score and the
// reason it surfaced (for the debug / trust view).
message SearchHit {
  ContextNode node       = 1;
  float       score      = 2;
  // Best rank across channels (1-based). 0 when the node was only
  // introduced via graph-neighborhood boost.
  int32       rank       = 3;
  // "semantic" | "keyword" | "graph-boost" | "fused"
  string      channel    = 4;
  // Free-form reason for debug UI ("matched 'auth' in label",
  // "cosine 0.83 against query embedding", "1-hop from decision-08").
  string      reason     = 5;
}

message SearchContextResponse {
  // One bucket per channel requested. Channel string mirrors
  // SearchHit.channel so callers can pattern-match.
  map<string, SearchHitList> channels = 1;
  // Total unique nodes across all channels (the Fused bucket's
  // deduplicated count after RRF).
  int32 total_unique = 2;
}

message SearchHitList {
  repeated SearchHit hits = 1;
}

message ListNodesRequest {
  string repo_id = 1;
  // Optional filter — empty = all kinds.
  repeated string kinds = 2;
  // Optional pagination. 0 → server default (200).
  int32  limit  = 3;
  int32  offset = 4;
  // Sort: "updated_at" (default, desc) | "label" (asc) | "confidence" (desc)
  string sort   = 5;
  // Optional filter on source_kind.
  repeated string source_kinds = 6;
  // When set, only nodes that include the substring in label OR
  // content_md are returned. Use SearchContext for ranked search;
  // this is for simple Browse-tab filtering.
  string label_contains = 7;
  // Filter on pinned / enabled flags. Unset → include both.
  // Tri-state encoded via int32: 0=either, 1=only true, 2=only false.
  int32 pinned_filter  = 8;
  int32 enabled_filter = 9;
}

message ListNodesResponse {
  repeated ContextNode nodes = 1;
  int32 total = 2;
}

message CreateNodeRequest {
  string repo_id    = 1;
  string kind       = 2;
  string label      = 3;
  string content_md = 4;
  map<string, string> attrs = 5;
  // Defaults to "manual" if omitted — the only legitimate value for
  // UI-originated creations. Non-manual source_kinds are accepted so
  // the analyzer / observer can write directly.
  string source_kind = 6;
  float  confidence  = 7;
}

message UpdateNodeRequest {
  string node_id    = 1;
  // Only non-empty string fields and explicitly-set oneof fields are
  // applied. Encoding "clear this field" for optional strings would
  // require wrappers; keep semantics simple by rejecting empty label
  // updates (UpdateNode with empty label → InvalidArgument).
  string label      = 2;
  string content_md = 3;
  map<string, string> attrs = 4;
  // Tri-state: 0=unchanged, 1=enable, 2=disable. Same shape for pinned.
  int32 enabled_op  = 5;
  int32 pinned_op   = 6;
  float confidence  = 7;  // 0 → unchanged
}

message PinNodeRequest {
  string node_id = 1;
  bool   pinned  = 2;
}

message ListEdgesRequest {
  string repo_id     = 1;
  // Optional: only edges incident to this node (either direction).
  string node_id     = 2;
  // Optional filter on rel string.
  repeated string rels = 3;
  int32  limit   = 4;
  int32  offset  = 5;
}

message ListEdgesResponse {
  repeated ContextEdge edges = 1;
  int32 total = 2;
}

message CreateEdgeRequest {
  string repo_id     = 1;
  string src_node_id = 2;
  string dst_node_id = 3;
  string rel         = 4;
  map<string, string> attrs = 5;
}

message ListFactsRequest {
  string repo_id = 1;
  // Optional filter — only facts for this subject node.
  string subject_node_id = 2;
  // When true, include facts whose valid_to is in the past. Defaults
  // to false (only currently-active facts).
  bool include_expired = 3;
  int32 limit  = 4;
  int32 offset = 5;
}

message ListFactsResponse {
  repeated ContextFact facts = 1;
  int32 total = 2;
}

// InjectionSource lists one memory item that contributed to an
// injected prompt. source_ref is ContextNode.id or ContextFact.id
// depending on source_type. Ordering mirrors the Markdown that was
// rendered, so the UI can display sources as a numbered sidebar.
message InjectionSource {
  string source_type = 1;   // "node" | "fact"
  string source_ref  = 2;
  string label       = 3;
  string channel     = 4;   // "passive" | "reactive" | "active"
  int32  tokens      = 5;   // estimated tokens contributed
  float  relevance   = 6;   // final score post-RRF + boost
}

message InjectionPreview {
  // The assembled Markdown block that would be prepended to the
  // Copilot system prompt. Empty when memory is disabled for the repo.
  string system_prompt = 1;
  // Ordered contributions so the UI can render a sidebar.
  repeated InjectionSource sources = 2;
  // Rough token estimate so the UI can compare against the Passive
  // budget from MemorySettings.
  int32 estimated_tokens = 3;
  // Injection tier this preview represents.
  // "passive" | "reactive" | "active"
  string tier = 4;
}

message PreviewInjectionRequest {
  string repo_id  = 1;
  // Either task_id (use its goal / base branch / review feedback) OR
  // raw_prompt (for a hypothetical task the user is about to create).
  // Exactly one must be set.
  string task_id    = 2;
  string raw_prompt = 3;
  // Which tier to preview. Defaults to "passive".
  string tier       = 4;
}

message RebuildEmbeddingsResponse {
  int32 rebuilt = 1;
  int32 skipped = 2;
}

message RebuildCodeGraphResponse {
  int32 files_scanned  = 1;
  int32 nodes_created  = 2;
  int32 nodes_updated  = 3;
  int32 edges_created  = 4;
}

message AnalyzeRepoRequest {
  string repo_id = 1;
  // When true, re-analyze even if an analyzer run already finished for
  // this repo. Defaults to false so "Analyze this repository" is
  // idempotent in normal operation.
  bool force = 2;
  // Optional override: the LLM model used for the analyzer session.
  // Falls back to MemorySettings.llm_model when empty.
  string model = 3;
}

message MemorySettings {
  string repo_id = 1;
  bool   enabled = 2;
  // Ollama | openai | voyage | google | openrouter | azure_openai
  string embedding_provider = 3;
  string embedding_model    = 4;
  int32  embedding_dim      = 5;
  string llm_provider       = 6;
  string llm_model          = 7;
  // Token budget for the Passive tier injection block. Hits above
  // this budget are truncated from the lowest-ranked tail.
  int32  passive_token_budget = 8;
  // Hops to expand the top-ranked semantic + keyword hits when
  // computing graph-neighborhood boost. 0 disables the boost.
  int32  top_k_neighbors    = 9;
  // When true, scratchpad entries whose confidence >= threshold skip
  // the trust gate and become ContextNodes directly. Default false.
  bool   auto_promote_high_confidence = 10;
  float  auto_promote_threshold       = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message UpdateMemorySettingsRequest {
  // settings.repo_id is required. All other fields are applied as-is
  // (including zero values); to ignore a field, fetch, mutate, and
  // resend — the semantics mirror SetConcurrency.
  MemorySettings settings = 1;
}

// MemoryHealth is the lightweight snapshot returned by GetMemoryHealth.
// Purpose-built for polling: no expensive aggregates (counts by kind,
// scratchpad buckets) — those live on ContextOverview.
message MemoryHealth {
  bool enabled            = 1;
  bool provider_reachable = 2;
  int32 vector_count      = 3;
  google.protobuf.Timestamp last_rebuild_at = 4;
  // Human-readable error from the last provider build or reachability
  // probe. Empty when healthy. Rendered verbatim in the Settings panel.
  string last_error       = 5;
}

message SuggestForNewTaskRequest {
  string repo_id    = 1;
  string draft_goal = 2;
  // Per-bucket cap. Defaults to 5 when unset. The server pulls 3x this
  // from the fused channel so each bucket has headroom.
  int32  limit      = 3;
}

message TaskSuggestion {
  string node_id        = 1;
  string label          = 2;
  string summary_md     = 3;
  float  score          = 4;
  // Original task ID — UI uses this to deep-link back to the Kanban row.
  string source_task_id = 5;
}

message ContextNodeSummary {
  string node_id    = 1;
  // Decision | Constraint (filtered server-side to those two kinds).
  string kind       = 2;
  string label      = 3;
  string content_md = 4;
  float  score      = 5;
}

message SuggestForNewTaskResponse {
  repeated TaskSuggestion     similar_tasks        = 1;
  repeated ContextNodeSummary related_decisions    = 2;
  repeated ContextNodeSummary related_constraints  = 3;
}

// WatchContextRequest resumes a stream by passing the server sequence
// of the last observed change per change-kind. Unset → send only
// future changes (no backfill).
message WatchContextRequest {
  string repo_id = 1;
  map<string, int64> since_seq_by_kind = 2;   // "node" | "edge" | "fact" | "scratchpad"
}

message ContextChangeEvent {
  int64  seq   = 1;
  string kind  = 2;  // "node" | "edge" | "fact" | "scratchpad" | "analyzer"
  string op    = 3;  // "create" | "update" | "delete" | "start" | "complete" | "error"
  string id    = 4;  // node / edge / fact / scratchpad entry id
  string repo_id = 5;
  google.protobuf.Timestamp occurred_at = 6;
  // Human-readable detail. Populated for analyzer error events so the
  // UI can render the failure message (with a copy button) inline
  // rather than forcing the user to tail the sidecar log.
  string message = 7;
}

// ---------------------------------------------------------------------------
// ScratchpadService domain messages
// ---------------------------------------------------------------------------

message ScratchpadEntry {
  string id                  = 1;
  string repo_id             = 2;
  string proposed_kind       = 3;
  string proposed_label      = 4;
  string proposed_content_md = 5;
  // observer-signal | analyzer | session-summary | manual-draft
  string source_kind         = 6;
  // Origin task / session for debug / trust UI. Empty when the
  // observer aggregated multiple sessions.
  string source_ref          = 7;
  // Free-form signal strings ("repeated file co-access (8x)",
  // "explicit reference in session summary", "matches dead-end
  // pattern X"). Rendered as chips in the Scratchpad card.
  repeated string signals    = 8;
  float  confidence          = 9;
  // pending | promoted | rejected | snoozed
  string status              = 10;
  google.protobuf.Timestamp snoozed_until = 11;
  google.protobuf.Timestamp created_at    = 12;
  google.protobuf.Timestamp updated_at    = 13;
}

message ListPendingRequest {
  string repo_id = 1;
  // Include statuses beyond "pending". Defaults to pending-only.
  repeated string statuses = 2;
  int32  limit   = 3;
  int32  offset  = 4;
}

message ListPendingResponse {
  repeated ScratchpadEntry entries = 1;
  int32 total = 2;
}

message RejectEntryRequest {
  string entry_id = 1;
  // Optional reason — persisted alongside the entry for auditability
  // and shown in the rejected filter of the Scratchpad tab.
  string reason   = 2;
}

message EditAndPromoteRequest {
  string entry_id            = 1;
  // Optional overrides — empty keeps the scratchpad value.
  string edited_kind         = 2;
  string edited_label        = 3;
  string edited_content_md   = 4;
  map<string, string> edited_attrs = 5;
}

message SnoozeRequest {
  string entry_id   = 1;
  // Server clamps to [1h, 30d]. Typical UI choices: 1d, 7d, 30d.
  int32  days       = 2;
}

message ScratchpadChangeEvent {
  int64  seq        = 1;
  string op         = 2;  // "create" | "promote" | "reject" | "snooze" | "update"
  string entry_id   = 3;
  string repo_id    = 4;
  google.protobuf.Timestamp occurred_at = 5;
}

// ---------------------------------------------------------------------------
// OllamaService domain messages
// ---------------------------------------------------------------------------

message OllamaStatus {
  bool   installed     = 1;
  bool   running       = 2;
  string base_url      = 3;
  string version       = 4;
  // Empty on success; set when the sidecar could not reach Ollama so
  // the UI can surface a specific message ("connection refused",
  // "not found on PATH").
  string message       = 5;
  // Canonical install command for the user's OS (winget string on
  // Windows). Populated only when installed == false.
  string install_command = 6;
}

message OllamaModel {
  string name         = 1;
  int64  size_bytes   = 2;
  double size_gb      = 3;
  string modified_at  = 4;
  bool   is_embedding = 5;
  // Set when the model's /api/show response declares embedding.
  int32  embedding_dim = 6;
  string description  = 7;
}

message OllamaListModelsResponse {
  repeated OllamaModel models = 1;
}

message OllamaRecommendedModel {
  string name          = 1;
  string description   = 2;
  string size_estimate = 3;   // e.g. "621 MB"
  int32  embedding_dim = 4;
  bool   installed     = 5;
  // "embedding" | "llm"
  string role          = 6;
}

message OllamaListRecommendedResponse {
  repeated OllamaRecommendedModel models = 1;
}

message PullModelRequest {
  string name = 1;
}

// OllamaPullProgressEvent is one streamed progress chunk from Ollama's
// /api/pull streaming endpoint. Exactly one of status / error / done
// is non-empty per event.
message OllamaPullProgressEvent {
  string status    = 1;   // "downloading layer abc", "verifying", ...
  int64  downloaded = 2;
  int64  total     = 3;
  string digest    = 4;
  string error     = 5;
  bool   done      = 6;
}

// ---------------------------------------------------------------------------
// ArtifactService — NLAH Phase A/B file-backed artifact registry
// ---------------------------------------------------------------------------
//
// Artifacts are file-backed outputs produced by plan / code / review / harness
// / attempt stages. They are stored on disk and indexed in SQLite via
// internal/store.ArtifactStore. kind / stage strings are NOT enums — same
// rationale as AgentEvent.kind (forward compatibility without proto bumps).

service ArtifactService {
  rpc List       (ListArtifactsRequest)       returns (ListArtifactsResponse);
  rpc Get        (GetArtifactRequest)         returns (Artifact);
  rpc GetContent (GetArtifactContentRequest)  returns (stream ArtifactChunk);
}

// Artifact mirrors internal/store.Artifact. attrs_json is a free-form
// JSON object for kind-specific metadata (e.g. subtask_id for code
// artifacts, harness version for harness artifacts).
message Artifact {
  string id           = 1;
  string task_id      = 2;
  string subtask_id   = 3;
  // stage: plan | code | review | harness | attempt
  string stage        = 4;
  string path         = 5;
  string kind         = 6;
  string content_hash = 7;
  int64  size_bytes   = 8;
  string attrs_json   = 9;
  google.protobuf.Timestamp created_at = 10;
}

message ListArtifactsRequest {
  string task_id = 1;
  // Optional filter on stage string. Empty = all stages.
  string stage   = 2;
  // Legacy hard cap (kept for wire compatibility with pre-pagination
  // clients). New callers should use page_size instead. When both are
  // set page_size wins.
  int32  limit   = 3;
  // Maximum number of rows to return in this page. 0 delegates to the
  // server default (currently 500). The server may return fewer rows
  // than requested at the end of the result set.
  int32  page_size = 4;
  // Opaque cursor returned by a previous ListArtifacts call. Empty on
  // the first page. Callers MUST pass the exact bytes the server
  // returned — format is an implementation detail and may change.
  string page_token = 5;
}

message ListArtifactsResponse {
  repeated Artifact artifacts = 1;
  // Non-empty when more rows are available. Pass to the next
  // ListArtifacts call's page_token to continue. Empty on the final page.
  string next_page_token = 2;
}

message GetArtifactRequest {
  string id = 1;
}

message GetArtifactContentRequest {
  string id = 1;
}

// ArtifactChunk is one streaming chunk from GetContent. eof is set on
// the final message; data may be empty when eof is true (flush sentinel).
message ArtifactChunk {
  bytes data = 1;
  bool  eof  = 2;
}

// ---------------------------------------------------------------------------
// HarnessService — NLAH Phase B/C editable NL harness + self-evolution
// ---------------------------------------------------------------------------
//
// The harness is the user-editable Markdown skill file that FleetKanban
// injects into every Copilot session. HarnessService exposes versioned
// read/write/rollback of that skill so the UI can surface a live editor
// and the self-evolution loop can propose updates.

service HarnessService {
  rpc GetActiveSkill     (google.protobuf.Empty)    returns (HarnessSkill);
  rpc ListSkillVersions  (google.protobuf.Empty)    returns (ListSkillVersionsResponse);
  rpc ValidateSkill      (ValidateSkillRequest)     returns (ValidateSkillResponse);
  rpc UpdateSkill        (UpdateSkillRequest)       returns (HarnessSkill);
  rpc RollbackSkill      (RollbackSkillRequest)     returns (HarnessSkill);
}

// HarnessSkill is one immutable snapshot of the NL skill file. Each
// UpdateSkill call mints a new version; the active version is the one
// with the highest version number. artifact_id links back to the
// Artifact row that backs this version on disk.
message HarnessSkill {
  string artifact_id  = 1;
  int32  version      = 2;
  string content_md   = 3;
  google.protobuf.Timestamp created_at = 4;
  string content_hash = 5;
}

message ListSkillVersionsResponse {
  repeated HarnessSkill versions = 1;
}

message ValidateSkillRequest {
  string content_md = 1;
}

// ValidateSkillResponse carries lint results for the proposed harness
// content. ok=true means the content is safe to activate; warnings are
// non-fatal style notes the UI may surface as inline hints.
message ValidateSkillResponse {
  bool             ok       = 1;
  repeated string  errors   = 2;
  repeated string  warnings = 3;
}

message UpdateSkillRequest {
  string content_md = 1;
}

message RollbackSkillRequest {
  // artifact_id of the HarnessSkill version to restore as the new active
  // version. A new version row is created (rather than mutating history)
  // so the audit trail is preserved.
  string artifact_id = 1;
}

// ---------------------------------------------------------------------------
// HarnessAttemptService — NLAH Phase C REWORK structured recording
// ---------------------------------------------------------------------------
//
// Every AI-review REWORK cycle that the orchestrator detects produces a
// harness_attempt row. HarnessAttemptService lets the UI enumerate pending
// attempts and record a human approve/reject decision. LLM-driven patch
// generation and SKILL.md application are deferred to Phase C LLM integration.

service HarnessAttemptService {
  rpc ListPending  (google.protobuf.Empty)               returns (ListHarnessAttemptsResponse);
  rpc ListForTask  (ListHarnessAttemptsForTaskRequest)   returns (ListHarnessAttemptsResponse);
  rpc Approve      (ApproveHarnessAttemptRequest)        returns (HarnessAttempt);
  rpc Reject       (RejectHarnessAttemptRequest)         returns (HarnessAttempt);
}

// HarnessAttempt mirrors internal/store.HarnessAttempt.
// decision is one of: pending | approved | rejected | superseded.
// proposed_patch is intentionally empty in Phase C; LLM patch generation
// is wired in the subsequent Phase C LLM integration step.
message HarnessAttempt {
  string id             = 1;
  string task_id        = 2;
  int32  rework_round   = 3;
  string failure_class  = 4;
  string observation_md = 5;
  string proposed_patch = 6;
  string proposed_hash  = 7;
  string decision       = 8;
  string decided_by     = 9;
  google.protobuf.Timestamp decided_at  = 10;
  google.protobuf.Timestamp created_at  = 11;
}

message ListHarnessAttemptsResponse {
  repeated HarnessAttempt attempts = 1;
}

message ListHarnessAttemptsForTaskRequest {
  string task_id = 1;
}

message ApproveHarnessAttemptRequest {
  string id         = 1;
  string decided_by = 2;
}

message RejectHarnessAttemptRequest {
  string id         = 1;
  string decided_by = 2;
}
