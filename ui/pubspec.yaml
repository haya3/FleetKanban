name: fleetkanban_ui
description: "FleetKanban Flutter desktop UI (Windows 11 only, Fluent Design)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Fluent Design system.
  fluent_ui: ^4.11.10

  # State management (AsyncNotifier for RPC calls, StreamProvider for gRPC server-streaming events).
  # Riverpod 3 moves Notifier / AsyncNotifier authoring onto build_runner code
  # generation via @riverpod; see riverpod_generator below.
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Windows desktop window chrome.
  flutter_acrylic: ^1.1.4       # Mica / Acrylic
  bitsdojo_window: ^0.1.6       # Custom title bar + MoveWindow
  system_theme: ^3.1.2          # OS accent colour

  # gRPC sidecar client. Versions are coupled: protoc_plugin 25.x emits
  # imports targeting protobuf 6.x, and grpc 5.x is the first line to depend
  # on protobuf 6.x.
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1

  # Persistence for UI-local preferences (pane selection, last repo, ...).
  shared_preferences: ^2.3.3

  # Placeholder: terminal (Phase D). Kept pinned so pub get does not re-resolve
  # when Phase D starts.
  xterm: ^4.0.0

  # Win32 FFI for the ITaskbarList3 overlay. Pulled in transitively by a
  # few other deps but declared explicitly since we import it directly.
  ffi: ^2.1.3
  # win32 6.x bump blocked by bitsdojo_window 0.1.6 which pins win32 ^5.1.1.
  # Upstream bitsdojo_window is unmaintained since 2024-10; migration requires
  # swapping to window_manager / windows_window_controller (separate scope).
  win32: ^5.15.0

  # Native folder picker for repository registration (IFileOpenDialog on Windows).
  file_selector: ^1.0.3

  # Sugiyama layout for the subtask execution DAG. Node rendering is handled by
  # fluent_ui; this package only computes layout and draws the edges.
  graphview: ^1.5.1

  # Cupertino icons (fluent_ui does not pull these itself, harmless).
  cupertino_icons: ^1.0.8
  # Fork that continues flutter_markdown (upstream discontinued in 2025).
  # API is drop-in compatible — same MarkdownBody / MarkdownStyleSheet.
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  msix: ^3.16.8
  # Riverpod 3 code generation toolchain. The riverpod_lint + custom_lint pair
  # is intentionally omitted — as of 2026-04, custom_lint 0.8.1 pins analyzer
  # ^8 while riverpod_lint 3.1.3 needs analyzer ^9, and pub cannot resolve the
  # pair. Add them back once custom_lint ships an analyzer-9 compatible build.
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

# MSIX packaging config (Phase F). Left here now so the build pipeline is
# ready — set a valid Publisher CN before releasing.
msix_config:
  display_name: FleetKanban
  publisher_display_name: FleetKanban
  identity_name: com.fleetkanban.FleetKanban
  msix_version: 0.1.0.0
  capabilities: runFullTrust
