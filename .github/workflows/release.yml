name: Release

# Source-only release: on `v*` tag push, generate release notes via
# git-cliff and publish a GitHub Release that contains the auto-attached
# source archives (zip/tar.gz) only. No prebuilt binaries — users build
# from source with `scripts/build-from-source.ps1` (see README).
#
# Binary distribution is paused until a code-signing certificate is in
# place; see `docs/signing-future.md`. When signing lands, reintroduce the
# Velopack pack / upload steps that lived in the previous revision of
# this workflow (visible in git history).
#
# Tag creation is always manual per the project branching policy.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render release notes only; do not create the Release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --tag ${{ github.ref_name }}
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --title 'FleetKanban ${{ github.ref_name }}' \
            --notes-file RELEASE_NOTES.md
