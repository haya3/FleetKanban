name: Lint & Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (golangci-lint + unit tests)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sidecar
    env:
      CGO_ENABLED: "0"
      FLEETKANBAN_SKIP_PWSH_CHECK: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sidecar/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: sidecar

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

  flutter:
    name: Flutter analyze
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: dart format --set-exit-if-changed .
        run: dart format --set-exit-if-changed .
