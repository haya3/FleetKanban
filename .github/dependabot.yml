version: 2
updates:
  - package-ecosystem: gomod
    directory: "/sidecar"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  - package-ecosystem: pub
    directory: "/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "flutter"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies", "github-actions"]
